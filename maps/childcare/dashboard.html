<script>
(function() {
  // === CONFIG ===
  // Change this URL to switch between different map styles
  const SVG_MAP_URL = "https://stage.bipartisanpolicy.org/wp-content/uploads/2026/01/us_states_filled.svg";
  // Alternative options:
  // const SVG_MAP_URL = "https://stage.bipartisanpolicy.org/wp-content/uploads/2026/01/us.svg";
  // const SVG_MAP_URL = "https://stage.bipartisanpolicy.org/wp-content/uploads/2026/01/us_states_outline.svg";
  
  const EXCLUDE_CODES = new Set(["DC", "PR"]);

  const mapEl = document.getElementById("cc-map");
  const panelEl = document.getElementById("cc-panel");
  const dataScript = document.getElementById("cc-data");

  if (!mapEl || !panelEl || !dataScript) return;

  // === DATA LOAD ===
  let rows = [];
  let nationalData = null;

  try {
    rows = JSON.parse((dataScript.textContent || "[]").trim());
    if (!Array.isArray(rows)) rows = [];
    
    // Calculate national totals
    nationalData = calculateNationalData(rows);
  } catch(e) {
    console.error("Failed to parse data:", e);
    rows = [];
  }

  // Normalize + index by code
  const byCode = new Map();
  rows.forEach(r => {
    const code = String(r.code || "").trim().toUpperCase();
    if (!code || EXCLUDE_CODES.has(code)) return;
    byCode.set(code, { ...r, code });
  });

  // === CALCULATE NATIONAL DATA ===
  function calculateNationalData(data) {
    const total = {
      potential_need: 0,
      supply: 0,
      gap: 0,
      avg_annual_cost: 0,
      median_hourly_wage: 0,
      children_under_5: 0,
      pct_dual_income: 0,
      pct_single_parent: 0,
      num_employees: 0,
      count: 0
    };

    data.forEach(state => {
      if (EXCLUDE_CODES.has(state.code)) return;
      
      total.potential_need += Number(state.potential_need) || 0;
      total.supply += Number(state.supply) || 0;
      total.gap += Number(state.gap) || 0;
      total.avg_annual_cost += Number(state.avg_annual_cost) || 0;
      total.median_hourly_wage += Number(state.median_hourly_wage) || 0;
      total.children_under_5 += Number(state.children_under_5) || 0;
      total.pct_dual_income += Number(state.pct_dual_income) || 0;
      total.pct_single_parent += Number(state.pct_single_parent) || 0;
      total.num_employees += Number(state.num_employees) || 0;
      total.count++;
    });

    // Calculate averages for cost, wage, and percentages
    if (total.count > 0) {
      total.avg_annual_cost = total.avg_annual_cost / total.count;
      total.median_hourly_wage = total.median_hourly_wage / total.count;
      total.pct_dual_income = total.pct_dual_income / total.count;
      total.pct_single_parent = total.pct_single_parent / total.count;
    }

    return total;
  }

  // === FORMATTERS ===
  const fmtInt = (v) => (v == null || Number.isNaN(Number(v))) ? "N/A" : Number(v).toLocaleString();
  const fmtMoney2 = (v) => (v == null || Number.isNaN(Number(v))) ? "N/A" : Number(v).toLocaleString(undefined, {
    style: "currency",
    currency: "USD",
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
  const fmtPct0 = (v) => (v == null || Number.isNaN(Number(v))) ? "N/A" : `${Math.round(Number(v) * 100)}%`;
  const fmtPct1 = (v) => (v == null || Number.isNaN(Number(v))) ? "N/A" : `${(Number(v) * 100).toFixed(1)}%`;

  // === COMPARISON HELPERS ===
  function calculateDifference(stateVal, nationalVal, format = 'percent') {
    if (!Number.isFinite(stateVal) || !Number.isFinite(nationalVal) || nationalVal === 0) {
      return null;
    }

    const diff = ((stateVal - nationalVal) / nationalVal) * 100;
    const isBetter = format === 'cost' ? diff < 0 : diff > 0;
    const symbol = diff > 0 ? '+' : '';
    
    return {
      value: `${symbol}${diff.toFixed(1)}%`,
      isBetter: isBetter,
      raw: diff
    };
  }

  // === DOWNLOAD CSV FUNCTION ===
  function downloadStateCSV(row) {
    if (!row) return;

    const csvContent = [
      ['Metric', 'Value'],
      ['State', row.state],
      ['State Code', row.code],
      ['Children Needing Care', fmtInt(row.potential_need)],
      ['Licensed Child Care Slots', fmtInt(row.supply)],
      ['Child Care Gap', fmtInt(row.gap)],
      ['Coverage Rate', fmtPct1(row.supply / row.potential_need)],
      ['Gap Percentage', fmtPct1(row.gap / row.potential_need)],
      ['Average Annual Cost of Care', fmtMoney2(row.avg_annual_cost)],
      ['Median Hourly Wage (ECE Workers)', fmtMoney2(row.median_hourly_wage)]
    ].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    
    link.setAttribute('href', url);
    link.setAttribute('download', `childcare-data-${row.code}-${new Date().toISOString().split('T')[0]}.csv`);
    link.style.visibility = 'hidden';
    
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

// === PANEL RENDER ===
  function renderPanel(row) {
    if (!row) {
      panelEl.innerHTML = `
        <div class="cc-tool__panelIntro">
          <div class="cc-tool__kicker">Selected state</div>
          <h3 class="cc-tool__stateTitle">Select a state</h3>
          <p class="cc-tool__muted">Click a state on the map to load data.</p>
        </div>
      `;
      return;
    }

    const need = Number(row.potential_need);
    const supply = Number(row.supply);
    const gap = Number(row.gap);

    const coverage = (Number.isFinite(need) && need > 0 && Number.isFinite(supply)) ? (supply / need) : null;
    const gapPct = (Number.isFinite(need) && need > 0 && Number.isFinite(gap)) ? (gap / need) : null;

    // Calculate comparisons with national data
    const costDiff = calculateDifference(row.avg_annual_cost, nationalData.avg_annual_cost, 'cost');
    const wageDiff = calculateDifference(row.median_hourly_wage, nationalData.median_hourly_wage, 'wage');
    const coverageDiff = calculateDifference(coverage, nationalData.supply / nationalData.potential_need, 'coverage');

    // Format large currency values
    const fmtBillion = (v) => {
      if (!Number.isFinite(v) || v === 0) return "N/A";
      return `$${(v / 1000000000).toFixed(2)}B`;
    };

    const fmtMillion = (v) => {
      if (!Number.isFinite(v) || v === 0) return "N/A";
      return `$${(v / 1000000).toFixed(1)}M`;
    };

    panelEl.innerHTML = `
      <div>
        <div class="cc-tool__kicker">Selected state</div>
        <h3 class="cc-tool__stateTitle">${row.state}</h3>

        <div class="cc-badgeRow">
          <div class="cc-badge">
            <span class="cc-badge__label">Coverage Rate</span>
            <span class="cc-badge__value">${coverage == null ? "N/A" : fmtPct0(coverage)}</span>
          </div>
          <div class="cc-badge">
            <span class="cc-badge__label">Gap Share</span>
            <span class="cc-badge__value">${gapPct == null ? "N/A" : fmtPct0(gapPct)}</span>
          </div>
        </div>

        <!-- Tabs -->
        <div class="cc-tabs">
          <button class="cc-tab cc-tab--active" data-tab="state">State Data</button>
          <button class="cc-tab" data-tab="national">vs. National</button>
        </div>

        <!-- State Data Tab -->

              <div class="cc-comparison__diff ${costDiff.isBetter ? 'cc-comparison__diff--better' : 'cc-comparison__diff--worse'}">

        <p class="cc-tool__muted" style="margin-top:14px;font-size:13px;">
          Data reflects 2025 estimates. Click the download button above to get the complete data sheet for ${row.state}.
        </p>
      </div>
    `;

    // Bind tab switching
    const tabs = panelEl.querySelectorAll('.cc-tab');
    const tabContents = panelEl.querySelectorAll('.cc-tab-content');
    
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const targetTab = tab.getAttribute('data-tab');
        
        tabs.forEach(t => t.classList.remove('cc-tab--active'));
        tab.classList.add('cc-tab--active');
        
        tabContents.forEach(content => {
          if (content.getAttribute('data-tab-content') === targetTab) {
            content.classList.add('cc-tab-content--active');
          } else {
            content.classList.remove('cc-tab-content--active');
          }
        });
      });
    });

    // Bind download button
    const downloadBtn = panelEl.querySelector('#cc-download-btn');
    if (downloadBtn) {
      downloadBtn.addEventListener('click', () => downloadStateCSV(row));
    }
  }

  // === MAP LOAD + BIND ===
  let selectedCode = null;
  let svgRoot = null;

  function applyBaseMapStyle() {
    if (!svgRoot) return;

    svgRoot.querySelectorAll("path").forEach((p) => {
      p.style.fill = "#e6e8ec";
      p.style.stroke = "#c9cdd3";
      p.style.strokeWidth = "1";
      p.style.vectorEffect = "non-scaling-stroke";
      p.style.transition = "fill 120ms ease, opacity 120ms ease";
      p.style.opacity = "1";
    });
  }

  async function loadMap() {
    try {
      // Show loading state
      mapEl.innerHTML = '<div class="cc-loading"><div class="cc-spinner"></div></div>';

      // Fetch the production SVG
      const res = await fetch(SVG_MAP_URL, { cache: "no-store" });
      if (!res.ok) throw new Error("Failed to fetch SVG: " + res.status);
      
      const svgText = await res.text();
      mapEl.innerHTML = svgText;

      svgRoot = mapEl.querySelector("svg");
      if (!svgRoot) throw new Error("SVG missing <svg> root");

      applyBaseMapStyle();

      // Bind interactions - production SVG uses id attributes for state codes
      const paths = svgRoot.querySelectorAll("path[id]");
      paths.forEach(p => {
        const code = (p.getAttribute("id") || "").trim().toUpperCase();
        if (!code || EXCLUDE_CODES.has(code)) return;

        if (!byCode.has(code)) {
          p.style.opacity = "0.35";
          p.style.cursor = "not-allowed";
          return;
        }

        p.addEventListener("mouseenter", () => {
          if (!p.classList.contains("cc-state--selected")) {
            p.style.fill = "#cfd8e3";
          }
        });

        p.addEventListener("mouseleave", () => {
          if (!p.classList.contains("cc-state--selected")) {
            p.style.fill = "#e6e8ec";
          }
        });

        p.addEventListener("click", () => {
          if (!byCode.has(code)) return;

          if (selectedCode) {
            const prev = svgRoot.querySelector(`path#${CSS.escape(selectedCode)}`);
            if (prev) {
              prev.classList.remove("cc-state--selected");
              prev.style.fill = "#e6e8ec";
            }
          }

          selectedCode = code;
          p.classList.add("cc-state--selected");
          renderPanel(byCode.get(code));
          
          // Smooth scroll to panel on mobile
          if (window.innerWidth <= 980) {
            panelEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
        });
      });
    } catch (err) {
      console.error("Map loading error:", err);
      mapEl.innerHTML = `
        <div style="padding: 40px; text-align: center; color: #dc3545;">
          <strong>Error loading map</strong><br>
          <small>Please check your internet connection and try again.</small>
        </div>
      `;
    }
  }

  // === BOOT ===
  renderPanel(null);
  loadMap();
})();
</script>
