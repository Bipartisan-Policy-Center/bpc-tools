}

<script>
(function(){
  // === CONFIG ===
  const FILLED_SVG_URL = "https://stage.bipartisanpolicy.org/wp-content/uploads/2026/01/us_states_filled.svg";
  const EXCLUDE_CODES = new Set(["DC","PR"]);

  const mapEl = document.getElementById("cc-map");
  const panelEl = document.getElementById("cc-panel");
  const dataScript = document.getElementById("cc-data");

  if (!mapEl || !panelEl || !dataScript) return;

  // === DATA LOAD (from embedded JSON) ===
  let rows = [];
  try {
    rows = JSON.parse((dataScript.textContent || "[]").trim());
    if (!Array.isArray(rows)) rows = [];
  } catch(e) {
    rows = [];
  }

  // Normalize + index by code
  const byCode = new Map();
  rows.forEach(r => {
    const code = String(r.code || "").trim().toUpperCase();
    if (!code || EXCLUDE_CODES.has(code)) return;
    byCode.set(code, { ...r, code });
  });

  // === FORMATTERS ===
  const fmtInt = (v) => (v == null || Number.isNaN(Number(v))) ? "N/A" : Number(v).toLocaleString();
  const fmtMoney0 = (v) => (v == null || Number.isNaN(Number(v))) ? "N/A" : Number(v).toLocaleString(undefined,{style:"currency",currency:"USD",maximumFractionDigits:0});
  const fmtMoney2 = (v) => (v == null || Number.isNaN(Number(v))) ? "N/A" : Number(v).toLocaleString(undefined,{style:"currency",currency:"USD",minimumFractionDigits:2,maximumFractionDigits:2});
  const fmtNum1 = (v) => (v == null || Number.isNaN(Number(v))) ? "N/A" : Number(v).toLocaleString(undefined,{maximumFractionDigits:1});
  const fmtPct0 = (v) => (v == null || Number.isNaN(Number(v))) ? "N/A" : `${Math.round(Number(v) * 100)}%`;

  // === PANEL RENDER ===
  function renderPanel(row){
    if (!row){
      panelEl.innerHTML = `
        <div class="cc-tool__panelIntro">
          <div class="cc-tool__kicker">Selected state</div>
          <h3 class="cc-tool__stateTitle">Select a state</h3>
          <p class="cc-tool__muted">Click a state on the map to load data.</p>
        </div>
      `;
      return;
    }

    const need = Number(row.potential_need);
    const supply = Number(row.supply);
    const gap = Number(row.gap);

    const coverage = (Number.isFinite(need) && need > 0 && Number.isFinite(supply)) ? (supply / need) : null;
    const gapPct = (Number.isFinite(need) && need > 0 && Number.isFinite(gap)) ? (gap / need) : null;

    panelEl.innerHTML = `
      <div>
        <div class="cc-tool__kicker">Selected state</div>
        <h3 class="cc-tool__stateTitle">${row.state} <span style="opacity:.5;font-weight:500;">(${row.code})</span></h3>

        <div class="cc-badgeRow">
          <div class="cc-badge">
            <span class="cc-badge__label">Coverage</span>
            <span class="cc-badge__value">${coverage == null ? "N/A" : fmtPct0(coverage)}</span>
          </div>
          <div class="cc-badge">
            <span class="cc-badge__label">Gap share</span>
            <span class="cc-badge__value">${gapPct == null ? "N/A" : fmtPct0(gapPct)}</span>
          </div>
        </div>

        <div class="cc-section">
          <h4>Costs &amp; Workforce</h4>
          <div class="cc-metric">
            <div class="cc-metric__label">Average annual cost of child care</div>
            <div class="cc-metric__value">${fmtMoney2(row.avg_annual_cost)}</div>
          </div>
          <div class="cc-metric">
            <div class="cc-metric__label">Median hourly wage (ECE workers)</div>
            <div class="cc-metric__value">${fmtMoney2(row.median_hourly_wage)}</div>
          </div>
        </div>

        <div class="cc-section">
          <h4>Supply &amp; Demand</h4>
          <div class="cc-metric">
            <div class="cc-metric__label">Children needing care</div>
            <div class="cc-metric__value">${fmtInt(row.potential_need)}</div>
          </div>
          <div class="cc-metric">
            <div class="cc-metric__label">Licensed child care slots</div>
            <div class="cc-metric__value">${fmtInt(row.supply)}</div>
          </div>
          <div class="cc-metric">
            <div class="cc-metric__label">Child care gap</div>
            <div class="cc-metric__value">${fmtInt(row.gap)}</div>
          </div>
        </div>

        <p class="cc-tool__muted" style="margin-top:12px;font-size:13px;">
          Data shown for demonstration purposes.
        </p>
 <p class="cc-tool__muted" style="margin-top:12px;font-size:13px;">
          Click <b>here</b> to download the full data sheet for this state.
        </p>

      </div>
    `;
  }

  // === MAP LOAD + BIND ===
  let selectedCode = null;
  let svgRoot = null;
// === MAP BASE STYLE ===
function applyBaseMapStyle() {
  if (!svgRoot) return;

  svgRoot.querySelectorAll("path").forEach((p) => {
    // Neutral default appearance
    p.style.fill = "#E6E8EC";          // light gray instead of black
    p.style.stroke = "#C9CDD3";        // subtle boundaries
    p.style.strokeWidth = "1";
    p.style.vectorEffect = "non-scaling-stroke";
    p.style.transition = "fill 120ms ease, opacity 120ms ease";
    p.style.opacity = "1";
  });
}

  async function loadMap(){
    const res = await fetch(FILLED_SVG_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("Failed to fetch SVG: " + res.status);
    const svgText = await res.text();
    mapEl.innerHTML = svgText;

    svgRoot = mapEl.querySelector("svg");
    if (!svgRoot) throw new Error("SVG missing <svg> root");

applyBaseMapStyle();

    // Bind to all state paths that have ids like "AL"
    const paths = svgRoot.querySelectorAll("path[id]");
    paths.forEach(p => {
      const code = (p.getAttribute("id") || "").trim().toUpperCase();
      if (!code || EXCLUDE_CODES.has(code)) return;

      // If you want to “gray out” states with no data:
      if (!byCode.has(code)) {
        p.style.opacity = "0.35";
        p.style.cursor = "not-allowed";
      }

      p.addEventListener("mouseenter", () => p.classList.add("cc-state--hover"));
      p.addEventListener("mouseleave", () => p.classList.remove("cc-state--hover"));

      p.addEventListener("click", () => {
        if (!byCode.has(code)) return;

        // clear previous selection
        if (selectedCode) {
          const prev = svgRoot.querySelector(`path#${CSS.escape(selectedCode)}`);
          if (prev) prev.classList.remove("cc-state--selected");
        }

        selectedCode = code;
        p.classList.add("cc-state--selected");
        renderPanel(byCode.get(code));
      });
    });
  }

  // Boot
  renderPanel(null);
  loadMap().catch(err => {
    console.error(err);
    panelEl.innerHTML = `
      <div class="cc-tool__panelIntro">
        <div class="cc-tool__kicker">Error</div>
        <h3 class="cc-tool__stateTitle">Map failed to load</h3>
        <p class="cc-tool__muted">Check the SVG URL and that it’s publicly accessible.</p>
      </div>
    `;
  });
})();
</script>
